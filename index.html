<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <p class="label">Stay on track</p>
        <h1>My <span>Tasks</span></h1>
    </header>

    <main class="card">

        <!-- INPUT ROW — use: #todo-input, #add-btn -->
        <div class="input-row">
            <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" />
            <button id="add-btn" title="Add task">+</button>
        </div>

        <!-- FILTER TABS — use: .filter-btn, data-filter attribute -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- TODO LIST — use: #todo-list to append/remove <li> items -->
        <div id="todo-section"></div>
        <!-- FOOTER — use: #items-count, #clear-completed-btn -->
        <div class="footer">
            <span id="items-count">6 tasks left</span>
            <button id="clear-completed-btn">Clear completed</button>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
